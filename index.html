<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>movie invitation🎬</title>
    <style>
        body {
            font-family: "Times New Roman", "Microsoft JhengHei", serif;
            text-align: center;
            background-color: #f4f4f4;
            color: #eee;
            padding: 50px;
        }

        .container {
            background-color: #060606;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3rem;
            color: #f7d13b;
            margin-bottom: 20px;
        }

        .movie-poster {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .highlight {
            color: #f7d13b;
            font-weight: bold;
        }

        .time-slot {
            background: #8b5a00;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MOVIE INVITATION</h1>
        
        <img src="https://upload.wikimedia.org/wikipedia/zh/e/e6/Hoppers_Poster.jpg" 
             alt="HOPPERS 海報" 
             class="movie-poster">

        <h2>魏揚典 先生</h2>
        <p>下週三或四有空一起看場電影嗎？</p>
        
        <hr>

        <h4>晚場時間：</h4>
        <div class="time-slot">20:50</div>
        <div class="time-slot">01:50</div>

        <h3 class="highlight">說有！快說有！</h3>
    </div>

</body>
</html>
